version: '3.8'

services:
  iams-mongo:
    image: mongo:7.0
    container_name: iams-mongodb
    environment:
      MONGO_INITDB_DATABASE: acetel_iams
    volumes:
      - /opt/acetel-iams/mongo-data:/data/db
      - ./mongo-init.js:/docker-entrypoint-initdb.d/init.js:ro
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    networks:
      - iams-network

  iams-backend:
    build:
      context: ./server
      dockerfile: Dockerfile.prod
    container_name: iams-backend
    depends_on:
      iams-mongo:
        condition: service_healthy
    environment:
      PORT: 5000
      MONGODB_URI: mongodb://iams-mongodb:27017/acetel_iams
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      NODE_ENV: production
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:8082}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:8082}
      UPLOAD_DIR: /opt/acetel-iams/uploads
      BACKUP_DIR: /opt/acetel-iams/backups
      MAX_FILE_SIZE_MB: "10"
      LOGO_URL: https://acetel.nou.edu.ng/logo.png
    volumes:
      - /opt/acetel-iams/uploads:/opt/acetel-iams/uploads
      - /opt/acetel-iams/backups:/opt/acetel-iams/backups
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:5000/api/health').then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    restart: always
    networks:
      - iams-network

  iams-frontend:
    build:
      context: ./client
      dockerfile: Dockerfile.prod
      args:
        # Empty = use relative /api path through Nginx (correct for production)
        VITE_API_URL: ""
    container_name: iams-frontend
    depends_on:
      - iams-backend
    restart: always
    networks:
      - iams-network

  iams-nginx:
    image: nginx:alpine
    container_name: iams-nginx
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /opt/acetel-iams/uploads:/opt/acetel-iams/uploads:ro
    ports:
      - "8082:80"
    depends_on:
      - iams-frontend
      - iams-backend
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    restart: always
    networks:
      - iams-network

networks:
  iams-network:
    driver: bridge
