version: '3.8'

services:
  # MongoDB for Application Data
  mongodb:
    image: mongo:7.0
    container_name: acetel-mongodb-prod
    restart: always
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_ROOT_USER:-acetel_admin}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_ROOT_PASSWORD:-changeme}
      - MONGO_INITDB_DATABASE=acetel_iams
    volumes:
      - mongodb_data:/data/db
      - ./mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    ports:
      - "127.0.0.1:27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - acetel-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Backend Server
  server:
    build:
      context: ./server
      dockerfile: Dockerfile.prod
    container_name: acetel-server-prod
    restart: always
    environment:
      - PORT=5000
      - MONGODB_URI=mongodb://${MONGO_ROOT_USER:-acetel_admin}:${MONGO_ROOT_PASSWORD:-changeme}@mongodb:27017/acetel_iams?authSource=admin
      - NODE_ENV=production
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:8080}
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost:8080}
      - UPLOAD_PATH=/app/uploads
      - BACKUP_DIR=/app/backups
      - MAX_FILE_SIZE_MB=10
      - LOGO_URL=${LOGO_URL:-https://acetel.nou.edu.ng/logo.png}
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - acetel-network
    volumes:
      - acetel_uploads:/app/uploads
      - acetel_backups:/app/backups
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  # Client (Nginx serving React)
  client:
    build:
      context: ./client
      dockerfile: Dockerfile.prod
      args:
        VITE_API_URL: ""
    container_name: acetel-client-prod
    restart: always
    ports:
      - "8080:80"
    networks:
      - acetel-network
    depends_on:
      - server
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
      - CHOWN
      - SETUID
      - SETGID

networks:
  acetel-network:
    driver: bridge

volumes:
  mongodb_data:
    driver: local
  acetel_uploads:
    driver: local
  acetel_backups:
    driver: local
