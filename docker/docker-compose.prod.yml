version: '3.8'

services:
  # MongoDB for Application Data
  mongodb:
    image: mongo:6.0
    container_name: acetel-mongodb-prod
    restart: always
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_ROOT_USER}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_ROOT_PASSWORD}
      - MONGO_APP_USERNAME=${MONGO_APP_USER}
      - MONGO_APP_PASSWORD=${MONGO_APP_PASSWORD}
    volumes:
      - mongodb_data_prod:/data/db
      - ./mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    networks:
      - internal-network

  # Redis for Queue Management
  redis:
    image: redis:7-alpine
    container_name: acetel-redis-prod
    restart: always
    command: redis-server --appendonly yes
    networks:
      - internal-network

  # Backend Server
  server:
    build:
      context: ../server
      dockerfile: Dockerfile
    container_name: acetel-server-prod
    restart: always
    environment:
      - PORT=5000
      - MONGODB_URI=mongodb://${MONGO_APP_USER}:${MONGO_APP_PASSWORD}@mongodb:27017/acetel_iams?authSource=acetel_iams
      - REDIS_HOST=redis
      - NODE_ENV=production
      - JWT_SECRET=${JWT_SECRET}
      - UPLOAD_PATH=/app/uploads
    depends_on:
      - mongodb
      - redis
    networks:
      - internal-network
      - proxy-network
    volumes:
      - acetel_uploads_prod:/app/uploads
    # --- TIER 3 SECURITY HARDENING ---
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    # read_only: true # Disabled temporarily to allow for easier troubleshooting of local storage
    tmpfs:
      - /tmp
      - /app/logs:uid=1000,gid=1000

  # Client (Nginx serving React)
  client:
    build:
      context: ../client
      dockerfile: Dockerfile
    container_name: acetel-client-prod
    restart: always
    ports:
      - "80:80"
      - "443:443"
    networks:
      - proxy-network
      - internal-network
    depends_on:
      - server
    # --- TIER 3 SECURITY HARDENING ---
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    # read_only: true
    tmpfs:
      - /tmp
      - /var/cache/nginx
      - /var/run

networks:
  internal-network:
    driver: bridge
  proxy-network:
    driver: bridge

volumes:
  mongodb_data_prod:
  acetel_uploads_prod:
