services:
  # MongoDB for Application Data
  mongodb:
    image: mongo:latest
    container_name: acetel-mongodb-dev
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb-dev-data:/data/db
    networks:
      - acetel-network

  # Backend Server
  server:
    image: node:20-alpine
    container_name: acetel-server-dev
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGODB_URI=mongodb://mongodb:27017/acetel_iams
      - REDIS_HOST=redis
      - NODE_ENV=development
      - UPLOAD_PATH=/app/uploads
    depends_on:
      - mongodb
      - redis
    networks:
      - acetel-network
    volumes:
      - ../server:/app
      - /app/node_modules
      - acetel-uploads-dev:/app/uploads

  # Redis for Queue Management
  redis:
    image: redis:alpine
    container_name: acetel-redis-dev
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - acetel-network

  # Frontend Client (Development)
  client:
    image: node:20-alpine
    container_name: acetel-client-dev
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host"
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:5000
    volumes:
      - ../client:/app
      - /app/node_modules
    networks:
      - acetel-network
    depends_on:
      - server

networks:
  acetel-network:
    driver: bridge

volumes:
  mongodb-dev-data:
  acetel-uploads-dev:
