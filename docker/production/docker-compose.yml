services:
  mongodb:
    image: mongo:7.0
    container_name: acetel-mongo
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_APP_DB}
    volumes:
      - /opt/acetel/mongo-data:/data/db
      - ./mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
      - ./mongod.conf:/etc/mongod.conf:ro
    command: ["mongod", "--config", "/etc/mongod.conf"]
    networks:
      - acetel-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:alpine
    container_name: acetel-redis
    restart: always
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - /opt/acetel/redis-data:/data
    networks:
      - acetel-network
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../..
      dockerfile: docker/production/Dockerfile.backend
    container_name: acetel-backend
    restart: always
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGODB_URI=mongodb://${MONGO_APP_USER}:${MONGO_APP_PASSWORD}@mongodb:27017/${MONGO_APP_DB}?authSource=${MONGO_APP_DB}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - FRONTEND_URL=${FRONTEND_URL}
      - UPLOAD_PATH=/app/uploads
      - LOGO_URL=${LOGO_URL}
    volumes:
      - /opt/acetel/uploads:/app/uploads
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - acetel-network

  frontend:
    build:
      context: ../..
      dockerfile: docker/production/Dockerfile.frontend
      args:
        - VITE_API_URL=${API_URL}
    container_name: acetel-frontend
    restart: always
    networks:
      - acetel-network

  nginx-proxy:
    image: nginx:alpine
    container_name: acetel-gateway
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - /opt/acetel/certs:/etc/nginx/certs:ro
      - /opt/acetel/uploads:/var/www/uploads:ro
    depends_on:
      - backend
      - frontend
    networks:
      - acetel-network

networks:
  acetel-network:
    driver: bridge
